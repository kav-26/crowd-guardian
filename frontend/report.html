<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Report Crowd | CrowdGuardian</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body class="bg-light">
  <!-- 🌐 Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm fixed-top">
    <div class="container">
      <a class="navbar-brand fw-bold text-white" href="dashboard.html">CrowdGuardian</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav align-items-center">
          <li class="nav-item">
            <a class="nav-link text-white" href="dashboard.html">Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-white" href="about.html">About</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-white active" href="report.html">Report Crowd</a>
          </li>
          <li class="nav-item">
            <button id="darkToggle" class="btn btn-light btn-sm me-3">
              Dark Mode
            </button>
          </li>
          <li class="nav-item">
            <a class="btn btn-outline-light btn-sm" href="login.html">Logout</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- 🧾 Report Crowd Form -->
  <div class="container mt-5 pt-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow-sm p-4">
          <h3 class="text-center mb-4 text-primary">Report Crowd Level</h3>
          <form id="reportForm">
            <div class="mb-3">
              <label for="placeSelect" class="form-label">Select Place</label>
              <select class="form-select" id="placeSelect" required>
                <option value="">Choose...</option>
                <option value="Charminar">Charminar</option>
                <option value="Hitech City">Hitech City</option>
                <option value="Birla Mandir">Birla Mandir</option>
                <option value="Ramoji Film City">Ramoji Film City</option>
                <option value="Hussain Sagar">Hussain Sagar</option>
                <option value="Gachibowli Stadium">Gachibowli Stadium</option>
                <option value="Salar Jung Museum">Salar Jung Museum</option>
                <option value="Shilparamam">Shilparamam</option>
              </select>
            </div>

            <div class="mb-3">
              <label for="crowdLevel" class="form-label">Crowd Level</label>
              <select id="crowdLevel" class="form-select" required>
                <option value="">Select crowd level...</option>
                <option value="low">🟢 Low — Few people, easy movement</option>
                <option value="moderate">🟡 Moderate — Manageable crowd</option>
                <option value="high">🔴 High — Very crowded, hard to move</option>
              </select>
            </div>

            <button type="submit" class="btn btn-primary w-100">Submit Report</button>
          </form>

          <div id="statusMsg" class="mt-3 text-center"></div>

          <div class="text-center mt-3">
            <a href="dashboard.html" class="btn btn-outline-secondary btn-sm">
              ← Back to Home
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // 🌙 Dark Mode Toggle
    const toggleBtn = document.getElementById("darkToggle");
    toggleBtn.addEventListener("click", () => {
      document.body.classList.toggle("dark-mode");
      const isDark = document.body.classList.contains("dark-mode");
      toggleBtn.textContent = isDark ? "Light Mode" : "Dark Mode";
      toggleBtn.classList.toggle("btn-dark");
      toggleBtn.classList.toggle("btn-light");
    });

    // 📝 Submit Report
    document.getElementById("reportForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const statusMsg = document.getElementById("statusMsg");

  const placeName = document.getElementById("placeSelect").value;
  const crowdLevel = document.getElementById("crowdLevel").value;

  // Assign approximate crowd percentage
  const crowdMap = {
    low: 20,
    moderate: 55,
    high: 85,
  };

  const crowdPercent = crowdMap[crowdLevel];
  if (!placeName || !crowdPercent) {
    statusMsg.innerHTML =
      '<div class="text-danger fw-bold">⚠️ Please select both fields.</div>';
    return;
  }

  try {
    const token = localStorage.getItem("token");
    if (!token) {
      statusMsg.innerHTML =
        '<div class="text-danger fw-bold">⚠️ Please log in first.</div>';
      setTimeout(() => (window.location.href = "login.html"), 1500);
      return;
    }

    const res = await fetch(`http://localhost:8000/api/places/${placeName}`, {
      method: "PATCH",
      headers: {
        "Content-Type": "application/json",
        Authorization: `Bearer ${token}`,
      },
      body: JSON.stringify({ crowdPercent }),
    });

    const data = await res.json();
    if (res.ok) {
      statusMsg.innerHTML =
        '<div class="text-success fw-bold">✅ Report submitted successfully! Redirecting...</div>';
      setTimeout(() => (window.location.href = "./dashboard.html"), 1500);
    } else {
      statusMsg.innerHTML = `<div class="text-danger fw-bold">❌ ${
        data.message || "Error submitting report."
      }</div>`;
    }
  } catch (err) {
    console.error(err);
    statusMsg.innerHTML =
      '<div class="text-danger fw-bold">⚠️ Server Error</div>';
  }
});

    

  </script>

  <style>
    .dark-mode {
      background-color: #121212 !important;
      color: #e0e0e0 !important;
    }

    .dark-mode .card {
      background-color: #1e1e1e;
      color: #f1f1f1;
    }

    .navbar .nav-link {
      transition: color 0.2s ease-in-out;
    }

    .navbar .nav-link:hover {
      color: #f8d34b !important;
    }
  </style>
</body>

</html>
